services:
  # ==========================================================================
  # WhatsApp REST API Server (main)
  # ==========================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: rest
    container_name: whatsapp-server
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/whatsapp
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - AUTO_CONNECT_SESSIONS=${AUTO_CONNECT_SESSIONS:-false}
      - API_KEY_SECRET=${API_KEY_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "bun", "-e", "const r = await fetch('http://localhost:3000/health'); process.exit(r.ok ? 0 : 1)" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - whatsapp-network

  # ==========================================================================
  # MCP Proxy Server (optional — enable when using LLM agents)
  # ==========================================================================
  mcp:
    build:
      context: .
      dockerfile: Dockerfile
      target: mcp
    container_name: whatsapp-mcp
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - MCP_API_BASE_URL=http://app:3000
      - MCP_API_KEY=${MCP_API_KEY:-}
      - MCP_RATE_LIMIT=${MCP_RATE_LIMIT:-30}
    depends_on:
      app:
        condition: service_healthy
    profiles:
      - mcp
    # stdio transport — use `docker attach` or pipe via agent
    stdin_open: true
    tty: false
    networks:
      - whatsapp-network

  # ==========================================================================
  # PostgreSQL
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: whatsapp-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=whatsapp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - whatsapp-network

  # ==========================================================================
  # Redis
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: whatsapp-redis
    restart: unless-stopped
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - whatsapp-network

volumes:
  postgres_data:
  redis_data:

networks:
  whatsapp-network:
    driver: bridge
