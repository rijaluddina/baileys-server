name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ===========================================================================
  # Lint & Type Check
  # ===========================================================================
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run --bun tsc --noEmit

  # ===========================================================================
  # Test
  # ===========================================================================
  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: whatsapp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run all tests
        run: bun test
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/whatsapp_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          NODE_ENV: test
          # MCP Proxy test configuration
          MCP_API_BASE_URL: http://localhost:3000
          MCP_API_KEY: test-ci-key
          MCP_RATE_LIMIT: 30

      - name: Test summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "Run: bun test" >> $GITHUB_STEP_SUMMARY
          echo "Includes: MCP security, proxy, parity, sanitization, and negative tests" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Build Docker Images
  # ===========================================================================
  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      matrix:
        target: [rest, mcp]
        include:
          - target: rest
            tag: whatsapp-server:latest
          - target: mcp
            tag: whatsapp-mcp:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.target }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          target: ${{ matrix.target }}
          tags: ${{ matrix.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
